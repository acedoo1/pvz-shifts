<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>График смен ПВЗ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#222;font-size:13px}
.header{background:#2e86de;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.header h1{font-size:15px;font-weight:700}
.user-info{font-size:12px;opacity:.9}
.toolbar{background:#fff;padding:10px 16px;border-bottom:1px solid #ddd;display:flex;flex-wrap:wrap;gap:8px;align-items:center;position:sticky;top:41px;z-index:190}
.search-wrap{position:relative;display:inline-block}
.search-wrap input{height:28px;padding:0 8px;border:1px solid #bbb;border-radius:5px;font-size:12px;width:160px}
.dropdown{position:absolute;top:30px;left:0;background:#fff;border:1px solid #ddd;border-radius:5px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:300;width:240px;max-height:200px;overflow-y:auto;display:none}
.dropdown.show{display:block}
.dropdown-item{padding:7px 10px;cursor:pointer;font-size:12px}
.dropdown-item:hover{background:#e8f4fd}
.date-range{display:flex;align-items:center;gap:6px}
.date-range input[type=date]{height:28px;padding:0 6px;border:1px solid #bbb;border-radius:5px;font-size:12px}
.date-range span{font-size:11px;color:#888}
.btn{padding:4px 12px;font-size:12px;border:1px solid #bbb;border-radius:5px;background:#fff;cursor:pointer;height:28px;white-space:nowrap}
.btn.blue{background:#2e86de;color:#fff;border-color:#2e86de}
.btn.grn{background:#0a7a4a;color:#fff;border-color:#0a7a4a}
.btn.red{background:#c0392b;color:#fff;border-color:#c0392b}
.btn.orange{background:#e67e00;color:#fff;border-color:#e67e00}
.btn:hover{opacity:.85}
.badge{background:#c0392b;color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px}
.divider{width:1px;height:20px;background:#ddd;flex-shrink:0}
.warn-banner{background:#fff3cd;border-left:4px solid #f0a500;padding:8px 16px;font-size:12px;color:#856404;display:none}
.warn-banner.show{display:block}
.cal-wrap{overflow-x:auto;padding:8px 16px 16px}
table{border-collapse:collapse;background:#fff;border-radius:8px;border:1px solid #ddd;font-size:12px}
th{background:#f0f0f0;font-size:10px;font-weight:700;color:#555;padding:5px 3px;border:1px solid #ddd;text-align:center;white-space:nowrap;min-width:34px}
th.th-pvz{text-align:left;min-width:90px;padding-left:8px;position:sticky;left:0;z-index:10;background:#f0f0f0}
th.th-name{text-align:left;min-width:130px;padding-left:8px;position:sticky;left:92px;z-index:10;background:#f0f0f0}
th.th-today{background:#2e86de;color:#fff}
td{padding:2px 2px;border:1px solid #eee;vertical-align:middle}
td.td-pvz{padding:5px 8px;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;background:#f5f5f5;border-right:2px solid #ddd;position:sticky;left:0;z-index:5;min-width:90px}
td.td-pvz:hover{background:#e8f4fd}
td.td-name{padding:4px 8px;white-space:nowrap;background:#fafafa;font-size:11px;position:sticky;left:92px;z-index:5;border-right:1px solid #ddd;min-width:130px}
td.td-sum{text-align:center;font-weight:700;font-size:11px;background:#f9f9f9;color:#2e86de;min-width:30px}
.day{width:100%;min-height:28px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;transition:.1s;padding:1px 2px;text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden}
.day:hover{filter:brightness(.92)}
.day.empty{background:#f8f8f8;color:#ddd}
.day.worked{background:#27ae60;color:#fff}
.day.sub{background:#f0a500;color:#fff}
.day.no-shift{background:#c0392b;color:#fff;font-size:9px}
.day.past-empty{background:#f0f0f0;color:#bbb;cursor:default}
.day.conflict{background:#8e44ad;color:#fff;font-size:9px;cursor:default}
.day.sub-here{background:#16a085;color:#fff}
.ctx{position:fixed;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:1000;min-width:210px;display:none}
.ctx.show{display:block}
.ctx-item{padding:8px 14px;cursor:pointer;font-size:13px;border-bottom:.5px solid #f0f0f0;display:flex;align-items:center;gap:6px}
.ctx-item:last-child{border-bottom:none}
.ctx-item:hover{background:#f5f5f5}
.ctx-item.yellow{color:#c87800}
.ctx-item.danger{color:#c0392b}
.ctx-item.purple{color:#8e44ad}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:10px;padding:20px;width:400px;max-width:95vw}
.modal h3{font-size:14px;margin-bottom:10px;font-weight:700}
.modal p{font-size:13px;color:#555;margin-bottom:14px;line-height:1.5}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.req-list{max-height:340px;overflow-y:auto}
.req-item{padding:10px;border-bottom:1px solid #eee;font-size:12px}
.req-item b{display:block;margin-bottom:3px;font-size:13px}
.req-actions{display:flex;gap:6px;margin-top:6px}
.sub-header td{background:#fff8e1;font-weight:700;font-size:12px;color:#c87800;padding:6px 8px}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:4px 16px 12px;font-size:11px;color:#666}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.statusbar{padding:3px 16px;font-size:11px;color:#888;min-height:18px}
.statusbar.ok{color:#0a7a4a}
.statusbar.err{color:#c0392b}
.loading{padding:40px;text-align:center;color:#888;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <h1>📅 График смен ПВЗ</h1>
  <div class="user-info" id="userInfo">Загрузка...</div>
</div>

<div class="toolbar">
  <div class="date-range">
    <input type="date" id="dateFrom">
    <span>—</span>
    <input type="date" id="dateTo">
    <button class="btn blue" onclick="render()">Показать</button>
    <button class="btn" onclick="setToday14()">+14 дней</button>
  </div>
  <div class="divider"></div>
  <div class="search-wrap">
    <input type="text" id="searchPvz" placeholder="🔍 ПВЗ..." oninput="filterDrop('pvz')" onfocus="showDrop('pvz')" onblur="hideDrop('pvz')" autocomplete="off">
    <div class="dropdown" id="dropPvz"></div>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchEmp" placeholder="🔍 Сотрудник..." oninput="filterDrop('emp')" onfocus="showDrop('emp')" onblur="hideDrop('emp')" autocomplete="off">
    <div class="dropdown" id="dropEmp"></div>
  </div>
  <button class="btn" onclick="clearFilters()">✕ Сбросить</button>
  <div class="divider"></div>
  <button class="btn grn" onclick="saveShifts()">💾 Сохранить</button>
  <button class="btn blue" onclick="loadShifts()">🔄 Обновить</button>
  <button class="btn" id="reqBtn" onclick="openRequests()" style="display:none">
    📋 Запросы<span class="badge" id="reqBadge" style="display:none">0</span>
  </button>
</div>

<div class="warn-banner" id="warnBanner"></div>
<div class="statusbar" id="statusBar"></div>

<div class="cal-wrap">
  <div id="loadingMsg" class="loading">Загрузка данных...</div>
  <table id="calTable" style="display:none">
    <thead id="calHead"></thead>
    <tbody id="calBody"></tbody>
  </table>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#27ae60"></div>Работаю</div>
  <div class="leg"><div class="leg-dot" style="background:#16a085"></div>Подменяю (на чужом ПВЗ)</div>
  <div class="leg"><div class="leg-dot" style="background:#f0a500"></div>Выйду на подмену</div>
  <div class="leg"><div class="leg-dot" style="background:#c0392b"></div>Нет смены</div>
  <div class="leg"><div class="leg-dot" style="background:#8e44ad"></div>Конфликт (дубль)</div>
</div>

<!-- Контекстное меню -->
<div class="ctx" id="ctx">
  <div class="ctx-item" id="ctxWork" onclick="ctxDo('work')">✅ Работаю</div>
  <div class="ctx-item yellow" id="ctxSub" onclick="ctxDo('sub')">🔄 Выйду на подмену</div>
  <div class="ctx-item danger" id="ctxClear" onclick="ctxDo('clear')">✕ Убрать смену</div>
  <div class="ctx-item" id="ctxReq" onclick="ctxDo('req')" style="display:none">📨 Запрос на изменение</div>
  <div class="ctx-item purple" id="ctxReqSub" onclick="ctxDo('reqsub')" style="display:none">🆘 Запросить подмену</div>
</div>

<!-- Модалка -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="mTitle"></h3>
    <p id="mText"></p>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn blue" id="mOk">OK</button>
    </div>
  </div>
</div>

<!-- Запросы -->
<div class="overlay" id="reqOverlay">
  <div class="modal" style="width:460px">
    <h3>📋 Запросы на изменение</h3>
    <div class="req-list" id="reqList"></div>
    <div class="modal-btns" style="margin-top:10px">
      <button class="btn" onclick="document.getElementById('reqOverlay').classList.remove('show')">Закрыть</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
var ADMIN_ID = '1';
var ENTITY_TYPE = 'pvz_shifts';
var currentUser = null, isAdmin = false;
var employees = []; // {id, name, pvzNums:[], pvzAddrs:[]}
var shifts = {};    // "uid_pvzNum_date" -> 'work'|'sub'
var requests = [];
var expanded = {};
var ctxTarget = null;
var selPvz = '', selEmp = '';

// ===== INIT =====
window.onload = function(){
  setToday14();
  document.addEventListener('click', hideCtx);

  if(typeof BX24 !== 'undefined'){
    BX24.init(function(){
      BX24.callMethod('user.current',{},function(r){
        if(!r.data()) return;
        currentUser = r.data();
        currentUser.ID = String(currentUser.ID);
        isAdmin = currentUser.ID === ADMIN_ID;
        document.getElementById('userInfo').innerText = (currentUser.LAST_NAME||'')+' '+(currentUser.NAME||'');
        if(isAdmin) document.getElementById('reqBtn').style.display = '';
      initEntity(function(){ loadEmployeesBX(); });
      });
    });
  } else {
    // Демо режим
    currentUser = {ID:ADMIN_ID,NAME:'Виктор',LAST_NAME:'Рассыльных'};
    isAdmin = true;
    document.getElementById('userInfo').innerText = 'Виктор Рассыльных (демо)';
    document.getElementById('reqBtn').style.display = '';
    loadDemoEmployees();
  }
};

// ===== ENTITY (Bitrix24 storage) =====
function initEntity(cb){
  // Создаём хранилище если не существует
  BX24.callMethod('entity.add',{ENTITY:ENTITY_TYPE,NAME:'График смен ПВЗ',ACCESS:{AU:'X',U1:'X'}},function(r){
    // Игнорируем ошибку если уже существует
    loadShiftsBX(cb);
  });
}

function loadShiftsBX(cb){
  BX24.callMethod('entity.item.get',{ENTITY:ENTITY_TYPE,FILTER:{PROPERTY_VALS:{type:'shift'}},PAGE_LIMIT:500},function(r){
    shifts = {};
    if(r.data()){
      r.data().forEach(function(item){
        if(item.PROPERTY_VALS && item.PROPERTY_VALS.key && item.PROPERTY_VALS.val){
          shifts[item.PROPERTY_VALS.key] = item.PROPERTY_VALS.val;
        }
      });
    }
    // Загружаем запросы
    BX24.callMethod('entity.item.get',{ENTITY:ENTITY_TYPE,FILTER:{PROPERTY_VALS:{type:'request'}},PAGE_LIMIT:200},function(rr){
      requests = [];
      if(rr.data()){
        rr.data().forEach(function(item){
          try{ requests.push(JSON.parse(item.PROPERTY_VALS.data)); }catch(e){}
        });
      }
      updateBadge();
      if(cb) cb();
      else render();
    });
  });
}

function saveShifts(){
  setStatus('Сохраняю...');
  // Сохраняем все смены одним объектом
  var data = JSON.stringify(shifts);
  BX24.callMethod('entity.item.get',{ENTITY:ENTITY_TYPE,FILTER:{PROPERTY_VALS:{type:'allshifts'}}},function(r){
    var existing = r.data();
    var method, params;
    if(existing && existing.length > 0){
      method = 'entity.item.update';
      params = {ENTITY:ENTITY_TYPE,ID:existing[0].ID,PROPERTY_VALS:{type:'allshifts',data:data}};
    } else {
      method = 'entity.item.add';
      params = {ENTITY:ENTITY_TYPE,PROPERTY_VALS:{type:'allshifts',data:data}};
    }
    BX24.callMethod(method,params,function(){
      setStatus('✓ Сохранено',true);
      render();
    });
  });
}

function loadShifts(){
  setStatus('Обновляю...');
  BX24.callMethod('entity.item.get',{ENTITY:ENTITY_TYPE,FILTER:{PROPERTY_VALS:{type:'allshifts'}}},function(r){
    shifts = {};
    if(r.data() && r.data().length > 0){
      try{ shifts = JSON.parse(r.data()[0].PROPERTY_VALS.data); }catch(e){}
    }
    setStatus('✓ Обновлено',true);
    render();
  });
}

// Fallback: localStorage для демо
function saveShiftsLocal(){
  localStorage.setItem('pvz_shifts_v4', JSON.stringify(shifts));
  localStorage.setItem('pvz_req_v4', JSON.stringify(requests));
  setStatus('✓ Сохранено',true);
  render();
}

// ===== EMPLOYEES =====
function parseDept(name){
  if(!name) return null;
  var m = name.match(/(\d+)\s*([А-ЯA-Z].*)/);
  if(!m) return null;
  return {n:m[1], a:m[2].trim()};
}

function loadEmployeesBX(){
  BX24.callMethod('department.get',{},function(dr){
    var depts = {};
    if(dr.data()) dr.data().forEach(function(d){ var p=parseDept(d.NAME); if(p) depts[d.ID]=p; });

    BX24.callMethod('user.get',{ACTIVE:true},function(ur){
      if(!ur.data()) return;
      var empMap = {};
      ur.data().forEach(function(u){
        var uid = String(u.ID);
        var deptIds = u.UF_DEPARTMENT || [];
        var pvzNums = [], pvzAddrs = [];
        deptIds.forEach(function(did){
          if(depts[did]){ pvzNums.push(depts[did].n); pvzAddrs.push(depts[did].a); }
        });
        if(pvzNums.length === 0) return; // служебный
        empMap[uid] = {
          id: uid,
          name: ((u.LAST_NAME||'')+' '+(u.NAME||'')).trim(),
          pvzNums: pvzNums,
          pvzAddrs: pvzAddrs
        };
      });
      employees = Object.values(empMap);
      employees.sort(function(a,b){ return (+a.pvzNums[0]||0)-(+b.pvzNums[0]||0); });
      buildDropdowns();
      loadShifts();
    });
  });
}

function loadDemoEmployees(){
  employees = [
    {id:'31',name:'Барсукова Наталья',pvzNums:['10'],pvzAddrs:['Северная 23']},
    {id:'83',name:'Латкина Ольга',pvzNums:['10'],pvzAddrs:['Северная 23']},
    {id:'19',name:'Смолянина Елена',pvzNums:['28'],pvzAddrs:['Р.Зорге 96а']},
    {id:'37',name:'ШПАКОВА СВЕТЛАНА',pvzNums:['28'],pvzAddrs:['Р.Зорге 96а']},
    {id:'35',name:'Горбачева Анастасия',pvzNums:['54'],pvzAddrs:['Октябрьская 020']},
    {id:'117',name:'Азимова Диана',pvzNums:['54'],pvzAddrs:['Октябрьская 020']},
    {id:'53',name:'Амзина Алина',pvzNums:['9'],pvzAddrs:['Октябрьская 93']},
    // Пример сотрудника на 2 ПВЗ
    {id:'55',name:'Ивкин Кирилл',pvzNums:['29','73'],pvzAddrs:['Ленина 192','Пролетарская 391']},
    {id:'45',name:'Поломошнов Расул',pvzNums:['29'],pvzAddrs:['Ленина 192']},
    {id:'17',name:'Прядкин Юрий',pvzNums:['74'],pvzAddrs:['Ленина 265']},
    {id:'101',name:'Лисиченко Алёна',pvzNums:['74'],pvzAddrs:['Ленина 265']},
    {id:'57',name:'Сайбель Алина',pvzNums:['83'],pvzAddrs:['Гражданский 50']},
    {id:'169',name:'Горячева Лиза',pvzNums:['83'],pvzAddrs:['Гражданский 50']},
    {id:'27',name:'Беседина Софья',pvzNums:['72'],pvzAddrs:['Гражданский 18']},
    {id:'89',name:'Урюмцева Дарья',pvzNums:['72'],pvzAddrs:['Гражданский 18']},
    {id:'43',name:'Бережных Евгения',pvzNums:['53'],pvzAddrs:['Красная 64']},
    {id:'123',name:'Неждова Надежда',pvzNums:['53'],pvzAddrs:['Красная 64']},
  ];
  buildDropdowns();
  // Демо: localStorage
  try{ var s=localStorage.getItem('pvz_shifts_v4'); if(s) shifts=JSON.parse(s); }catch(e){}
  try{ var r=localStorage.getItem('pvz_req_v4'); if(r) requests=JSON.parse(r); }catch(e){}
  updateBadge();
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('calTable').style.display = '';
  render();
}

// ===== DROPDOWNS =====
function buildDropdowns(){
  var pvzMap = {};
  employees.forEach(function(e){
    e.pvzNums.forEach(function(n,i){
      if(!pvzMap[n]) pvzMap[n] = {num:n, addr:e.pvzAddrs[i]};
    });
  });
  var pvzList = Object.values(pvzMap).sort(function(a,b){ return (+a.num||0)-(+b.num||0); });
  setDropItems('pvz', pvzList.map(function(p){ return {id:p.num, label:(p.num?'№'+p.num+' ':'')+p.addr}; }));
  setDropItems('emp', employees.map(function(e){ return {id:e.id, label:e.name+' ('+e.pvzNums.map(function(n){return'№'+n}).join(',')+')'}; }));
}

function setDropItems(type, items){
  var drop = document.getElementById('drop'+ucfirst(type));
  drop._items = items;
  renderDropItems(type, items);
}
function renderDropItems(type, items){
  var drop = document.getElementById('drop'+ucfirst(type));
  drop.innerHTML = '';
  items.forEach(function(item){
    var div = document.createElement('div');
    div.className = 'dropdown-item';
    div.innerText = item.label;
    div.onmousedown = function(e){ e.preventDefault(); selectFilter(type, item.id, item.label); };
    drop.appendChild(div);
  });
}
function ucfirst(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function filterDrop(type){
  var val = document.getElementById('search'+ucfirst(type)).value.toLowerCase();
  var items = (document.getElementById('drop'+ucfirst(type))._items||[]).filter(function(i){ return i.label.toLowerCase().includes(val); });
  renderDropItems(type, items);
  document.getElementById('drop'+ucfirst(type)).classList.add('show');
}
function showDrop(type){ filterDrop(type); }
function hideDrop(type){ setTimeout(function(){ document.getElementById('drop'+ucfirst(type)).classList.remove('show'); }, 150); }
function selectFilter(type, id, label){
  if(type==='pvz'){ selPvz=id; document.getElementById('searchPvz').value=label; }
  else { selEmp=id; document.getElementById('searchEmp').value=label; }
  render();
}
function clearFilters(){ selPvz=''; selEmp=''; document.getElementById('searchPvz').value=''; document.getElementById('searchEmp').value=''; render(); }

// ===== DATE =====
function pad(n){ return n<10?'0'+n:String(n); }
function toDs(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function addDays(ds,n){ var d=new Date(ds); d.setDate(d.getDate()+n); return toDs(d); }
function setToday14(){ var t=toDs(new Date()); document.getElementById('dateFrom').value=t; document.getElementById('dateTo').value=addDays(t,13); }
function getDates(){
  var from=document.getElementById('dateFrom').value, to=document.getElementById('dateTo').value;
  if(!from||!to) return [];
  var dates=[],cur=new Date(from),end=new Date(to);
  while(cur<=end){ dates.push(toDs(cur)); cur.setDate(cur.getDate()+1); }
  return dates;
}

// ===== SHIFT KEY =====
// key = uid_pvzNum_date
function sk(uid,pvzNum,ds){ return uid+'_'+pvzNum+'_'+ds; }

// ===== CONFLICT CHECK =====
// Проверяем есть ли у сотрудника смена на ЛЮБОМ ПВЗ в этот день
function hasShiftAnywhere(uid, ds, exceptPvz){
  var allPvzNums = getAllPvzNums();
  return allPvzNums.some(function(pvzNum){
    if(pvzNum === exceptPvz) return false;
    return !!shifts[sk(uid,pvzNum,ds)];
  });
}

function getAllPvzNums(){
  var seen = {};
  employees.forEach(function(e){ e.pvzNums.forEach(function(n){ seen[n]=1; }); });
  // Также из смен подмены
  Object.keys(shifts).forEach(function(k){ var p=k.split('_'); if(p.length>=2) seen[p[1]]=1; });
  return Object.keys(seen);
}

// Проверяем дубль на ПВЗ в этот день
function pvzHasWorker(pvzNum, ds, exceptUid){
  return employees.some(function(e){
    if(e.id === exceptUid) return false;
    return shifts[sk(e.id,pvzNum,ds)] === 'work';
  }) || Object.keys(shifts).some(function(k){
    var p=k.split('_');
    return p[1]===pvzNum && p[2]===ds && shifts[k]==='work' && p[0]!==exceptUid;
  });
}

// ===== RENDER =====
function render(){
  var dates = getDates();
  if(!dates.length || !employees.length) return;
  var today = toDs(new Date());

  // Строим список ПВЗ
  var pvzMap = {};
  employees.forEach(function(e){
    e.pvzNums.forEach(function(pvzNum, pi){
      if(selPvz && pvzNum !== selPvz) return;
      if(selEmp && e.id !== selEmp) return;
      if(!isAdmin && currentUser){
        var myPvzNums = getMyPvzNums();
        if(myPvzNums.indexOf(pvzNum) === -1) return;
      }
      // Проверяем есть ли у сотрудника хоть одна смена подмены на этом ПВЗ в диапазоне
      var isSubOnly = e.pvzNums.indexOf(pvzNum) === -1;
      if(!pvzMap[pvzNum]) pvzMap[pvzNum] = {num:pvzNum, addr:e.pvzAddrs[pi]||'', emps:[]};
      if(!pvzMap[pvzNum].emps.find(function(x){ return x.id===e.id && x.pvzNum===pvzNum; })){
        pvzMap[pvzNum].emps.push({id:e.id,name:e.name,pvzNum:pvzNum,isOwn:e.pvzNums.indexOf(pvzNum)!==-1});
      }
    });
  });

  // Добавляем подменяющих (у кого смена на чужом ПВЗ в диапазоне)
  Object.keys(shifts).forEach(function(k){
    var p = k.split('_');
    if(p.length < 3) return;
    var uid=p[0], pvzNum=p[1], ds=p[2];
    if(dates.indexOf(ds) === -1) return;
    var emp = employees.find(function(e){ return e.id===uid; });
    if(!emp) return;
    if(emp.pvzNums.indexOf(pvzNum) !== -1) return; // свой ПВЗ
    if(!pvzMap[pvzNum]) pvzMap[pvzNum] = {num:pvzNum, addr:'', emps:[]};
    if(!pvzMap[pvzNum].emps.find(function(x){ return x.id===uid; })){
      pvzMap[pvzNum].emps.push({id:uid, name:emp.name+'*', pvzNum:pvzNum, isOwn:false});
    }
  });

  var pvzList = Object.values(pvzMap).sort(function(a,b){ return (+a.num||0)-(+b.num||0); });

  // Предупреждения
  var warnDays = [];
  pvzList.forEach(function(pvz){
    dates.filter(function(ds){ return ds>=today; }).forEach(function(ds){
      var hasW = pvz.emps.some(function(e){ return shifts[sk(e.id,pvz.num,ds)]==='work'; });
      if(!hasW) warnDays.push('ПВЗ №'+pvz.num+' '+ds);
    });
  });
  var wb = document.getElementById('warnBanner');
  if(warnDays.length){
    wb.className='warn-banner show';
    wb.innerHTML='⚠️ <b>Нет смены:</b> '+warnDays.slice(0,6).join(', ')+(warnDays.length>6?'...':'');
  } else { wb.className='warn-banner'; }

  // Thead
  var head = document.getElementById('calHead');
  head.innerHTML = '';
  var hr = document.createElement('tr');
  addTh(hr,'ПВЗ','th-pvz');
  addTh(hr,'Сотрудник','th-name');
  dates.forEach(function(ds){
    var d=new Date(ds), dn=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    var th=document.createElement('th');
    th.innerHTML='<div>'+dn[d.getDay()]+'</div><div>'+d.getDate()+'</div>';
    th.className=ds===today?'th-today':'';
    hr.appendChild(th);
  });
  addTh(hr,'Σ');
  head.appendChild(hr);

  // Tbody
  var tbody = document.getElementById('calBody');
  tbody.innerHTML = '';
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('calTable').style.display = '';

  pvzList.forEach(function(pvz){
    var isExp = expanded[pvz.num];

    // Свёрнутая строка ПВЗ
    var pvzRow = document.createElement('tr');
    var tdPvz = document.createElement('td');
    tdPvz.className = 'td-pvz';
    tdPvz.innerHTML=(isExp?'▼ ':'▶ ')+'<b>№'+pvz.num+'</b><br><span style="font-weight:normal;font-size:10px;color:#888">'+pvz.addr+'</span>';
    tdPvz.onclick = function(){ expanded[pvz.num]=!expanded[pvz.num]; render(); };
    pvzRow.appendChild(tdPvz);
    var tdName = document.createElement('td');
    tdName.className='td-name'; tdName.style.color='#888';
    tdName.innerText=pvz.emps.filter(function(e){return e.isOwn}).length+' сотр.';
    pvzRow.appendChild(tdName);

    var pvzTotal = 0;
    dates.forEach(function(ds){
      var workers=pvz.emps.filter(function(e){return shifts[sk(e.id,pvz.num,ds)]==='work'});
      var subs=pvz.emps.filter(function(e){return shifts[sk(e.id,pvz.num,ds)]==='sub'});
      var isPast=ds<today;
      var div=document.createElement('div'); div.className='day';
      if(workers.length>1){
        div.classList.add('conflict');
        div.innerText='!Дубль';
        div.title='Двойная смена: '+workers.map(function(e){return e.name}).join(', ');
      } else if(workers.length===1){
        div.classList.add('worked');
        div.innerText=workers[0].name.split(' ')[0];
        pvzTotal++;
      } else if(subs.length>0){
        div.classList.add('sub');
        div.innerText=subs.map(function(e){return e.name.split(' ')[0]}).join(',');
      } else if(!isPast){
        div.classList.add('no-shift'); div.innerText='—';
      } else {
        div.classList.add('past-empty');
      }
      var td=document.createElement('td'); td.appendChild(div); pvzRow.appendChild(td);
    });
    var tdS=document.createElement('td'); tdS.className='td-sum'; tdS.innerText=pvzTotal; pvzRow.appendChild(tdS);
    tbody.appendChild(pvzRow);

    // Развёрнутые строки
    if(isExp){
      pvz.emps.forEach(function(emp){
        var fullEmp = employees.find(function(e){return e.id===emp.id});
        var isMe = currentUser && emp.id===currentUser.ID;
        var canEdit = isAdmin || isMe;
        var eRow = document.createElement('tr');
        var ePvz=document.createElement('td'); ePvz.className='td-pvz'; ePvz.style.background='#fafafa'; ePvz.style.fontWeight='normal'; eRow.appendChild(ePvz);
        var eName=document.createElement('td'); eName.className='td-name';
        eName.innerHTML=emp.name+(emp.isOwn?'':' <span style="color:#16a085;font-size:10px">(подмена)</span>');
        if(isMe) eName.style.fontWeight='700';
        eRow.appendChild(eName);

        var empTotal=0;
        dates.forEach(function(ds){
          var k=sk(emp.id,pvz.num,ds);
          var val=shifts[k];
          var isPast=ds<today;
          var hasConflict=pvzHasWorker(pvz.num,ds,emp.id)&&val==='work';
          var div=document.createElement('div'); div.className='day';

          if(hasConflict&&val==='work'){
            div.classList.add('conflict');
            div.innerText='!';
            div.title='Попросите напарника или администратора убрать дублирующую смену';
          } else if(val==='work'){
            div.classList.add(emp.isOwn?'worked':'sub-here');
            div.innerText='✓'; empTotal++;
          } else if(val==='sub'){
            div.classList.add('sub'); div.innerText='↔';
          } else if(isPast){
            div.classList.add('past-empty');
          } else {
            div.classList.add('empty');
          }

          if(canEdit && !hasConflict){
            (function(eid,eds,epvz,epast){
              div.addEventListener('contextmenu',function(e){e.preventDefault();e.stopPropagation();showCtx(e,eid,eds,epvz,epast);});
              div.addEventListener('click',function(e){
                e.stopPropagation();
                if(epast&&!isAdmin){reqPast(eid,epvz,eds,emp.name);return;}
                quickToggle(eid,epvz,eds);
              });
            })(emp.id,ds,pvz.num,isPast);
          } else if(canEdit && hasConflict){
            div.title='Попросите напарника или администратора убрать дублирующую смену';
          }

          var td=document.createElement('td'); td.appendChild(div); eRow.appendChild(td);
        });
        var eSum=document.createElement('td'); eSum.className='td-sum'; eSum.innerText=empTotal; eRow.appendChild(eSum);
        tbody.appendChild(eRow);
      });
    }
  });

  // Доска подмен
  if(!isAdmin) renderSubBoard(tbody,dates,today);
}

function getMyPvzNums(){
  if(!currentUser) return [];
  var me=employees.find(function(e){return e.id===currentUser.ID});
  return me ? me.pvzNums : [];
}

function addTh(row,text,cls){
  var th=document.createElement('th');
  th.innerText=text||'';
  if(cls) th.className=cls;
  row.appendChild(th);
}

function renderSubBoard(tbody,dates,today){
  var subEmps=employees.filter(function(e){
    return e.pvzNums.some(function(pvzNum){
      return dates.some(function(ds){return shifts[sk(e.id,pvzNum,ds)]==='sub';});
    });
  });
  if(!subEmps.length) return;
  var hrow=document.createElement('tr'); hrow.className='sub-header';
  var htd=document.createElement('td'); htd.colSpan=dates.length+3; htd.innerText='🔄 Готовы выйти на подмену';
  hrow.appendChild(htd); tbody.appendChild(hrow);
  subEmps.forEach(function(emp){
    emp.pvzNums.forEach(function(pvzNum,pi){
      var hasSub=dates.some(function(ds){return shifts[sk(emp.id,pvzNum,ds)]==='sub';});
      if(!hasSub) return;
      var row=document.createElement('tr');
      var p1=document.createElement('td'); p1.className='td-pvz'; p1.style.fontWeight='normal'; p1.innerText='№'+pvzNum; row.appendChild(p1);
      var p2=document.createElement('td'); p2.className='td-name'; p2.innerText=emp.name; row.appendChild(p2);
      dates.forEach(function(ds){
        var td=document.createElement('td');
        if(shifts[sk(emp.id,pvzNum,ds)]==='sub'){
          var div=document.createElement('div'); div.className='day sub'; div.innerText='↔';
          div.title='Нажмите чтобы запросить подмену';
          (function(eid,eds,epvz,ename){div.onclick=function(){reqSub(eid,eds,epvz,ename);};})(emp.id,ds,pvzNum,emp.name);
          td.appendChild(div);
        }
        row.appendChild(td);
      });
      var s=document.createElement('td'); s.className='td-sum'; row.appendChild(s);
      tbody.appendChild(row);
    });
  });
}

// ===== SHIFTS =====
function quickToggle(uid,pvzNum,ds){
  console.log('quickToggle',uid,pvzNum,ds);
  var k=sk(uid,pvzNum,ds);
  console.log('key',k,'current val',shifts[k]);
  // Проверка дубля только при установке 'work'
  if(!shifts[k]){
    if(pvzHasWorker(pvzNum,ds,uid)){
      showInfo('На этом ПВЗ в этот день уже назначен другой сотрудник. Попросите напарника или администратора убрать дублирующую смену.');
      return;
    }
    if(hasShiftAnywhere(uid,ds,pvzNum)){
      showInfo('У этого сотрудника уже есть смена на другом ПВЗ в этот день!');
      return;
    }
    shifts[k]='work';
  } else if(shifts[k]==='work'){
    shifts[k]='sub';
  } else {
    delete shifts[k];
  }
  console.log('new val',shifts[k],'shifts',JSON.stringify(shifts));
  if(typeof BX24!=='undefined') saveShifts(); else saveShiftsLocal();
}

function setShiftDirect(uid,ds,pvzNum,val){
  var k=sk(uid,ds,pvzNum);
  if(val) shifts[k]=val; else delete shifts[k];
  if(typeof BX24!=='undefined') saveShifts(); else saveShiftsLocal();
}

// ===== CTX =====
function showCtx(e,uid,ds,pvzNum,isPast){
  ctxTarget={uid,ds,pvzNum,isPast};
  var val=shifts[sk(uid,ds,pvzNum)];
  document.getElementById('ctxWork').style.display=val==='work'?'none':'';
  document.getElementById('ctxSub').style.display=val==='sub'?'none':'';
  document.getElementById('ctxClear').style.display=val?'':'none';
  document.getElementById('ctxReq').style.display=isPast&&!isAdmin?'':'none';
  document.getElementById('ctxReqSub').style.display=val==='sub'&&!isAdmin?'':'none';
  var m=document.getElementById('ctx');
  m.style.left=Math.min(e.clientX,window.innerWidth-220)+'px';
  m.style.top=Math.min(e.clientY,window.innerHeight-200)+'px';
  m.classList.add('show');
}
function hideCtx(){document.getElementById('ctx').classList.remove('show');}
function ctxDo(action){
  hideCtx();
  if(!ctxTarget) return;
  var {uid,ds,pvzNum,isPast}=ctxTarget;
  if(action==='work') quickToggle(uid,ds,pvzNum);
  else if(action==='sub') setShiftDirect(uid,ds,pvzNum,'sub');
  else if(action==='clear') setShiftDirect(uid,ds,pvzNum,null);
  else if(action==='req') reqPast(uid,ds,pvzNum,'');
  else if(action==='reqsub') reqSub(uid,ds,pvzNum,'');
}

// ===== REQUESTS =====
function reqPast(uid,ds,pvzNum,name){
  showModal('Запрос на изменение',
    (name||'Сотрудник')+' хочет изменить смену за '+ds+' на ПВЗ №'+pvzNum+'. Отправить запрос?',
    function(){
      requests.push({id:Date.now(),uid,name,date:ds,pvzNum,type:'past',status:'pending',created:new Date().toISOString()});
      saveRequests(); updateBadge(); setStatus('Запрос отправлен',true);
    });
}

function reqSub(uid,ds,pvzNum,name){
  showModal('Запросить подмену',
    'Запросить подмену у '+name+' на '+ds+' (ПВЗ №'+pvzNum+')? После одобрения смена перейдёт вам.',
    function(){
      requests.push({id:Date.now(),uid,name,date:ds,pvzNum,requesterId:currentUser.ID,type:'sub',status:'pending',created:new Date().toISOString()});
      saveRequests(); updateBadge(); setStatus('Запрос отправлен',true);
    });
}

function saveRequests(){
  if(typeof BX24==='undefined'){localStorage.setItem('pvz_req_v4',JSON.stringify(requests));return;}
  // Сохраняем запросы в entity
  var data=JSON.stringify(requests);
  BX24.callMethod('entity.item.get',{ENTITY:ENTITY_TYPE,FILTER:{PROPERTY_VALS:{type:'allrequests'}}},function(r){
    var ex=r.data();
    var method=ex&&ex.length>0?'entity.item.update':'entity.item.add';
    var params={ENTITY:ENTITY_TYPE,PROPERTY_VALS:{type:'allrequests',data:data}};
    if(ex&&ex.length>0) params.ID=ex[0].ID;
    BX24.callMethod(method,params,function(){});
  });
}

function openRequests(){
  var list=document.getElementById('reqList');
  var pending=requests.filter(function(r){return r.status==='pending';});
  if(!pending.length){
    list.innerHTML='<div style="padding:16px;color:#888;text-align:center">Нет новых запросов</div>';
  } else {
    list.innerHTML='';
    pending.forEach(function(r){
      var div=document.createElement('div'); div.className='req-item';
      var label=r.type==='past'?'📝 Изменение прошлой смены':'🔄 Запрос подмены';
      div.innerHTML='<b>'+label+'</b>'+r.name+' — '+r.date+' (ПВЗ №'+r.pvzNum+')'+
        '<div class="req-actions">'+
        '<button class="btn grn" onclick="approveReq('+r.id+')">✓ Одобрить</button>'+
        '<button class="btn red" onclick="rejectReq('+r.id+')">✕ Отклонить</button>'+
        '</div>';
      list.appendChild(div);
    });
  }
  document.getElementById('reqOverlay').classList.add('show');
}

function approveReq(id){
  var r=requests.find(function(x){return x.id===id;});
  if(!r) return;
  r.status='approved';
  if(r.type==='past'){
    var k=sk(r.uid,r.pvzNum,r.date);
    if(shifts[k]) delete shifts[k]; else shifts[k]='work';
  } else if(r.type==='sub'){
    // Подменяющий получает смену на чужом ПВЗ
    shifts[sk(r.requesterId,r.pvzNum,r.date)]='work';
    delete shifts[sk(r.uid,r.pvzNum,r.date)];
  }
  saveRequests();
  if(typeof BX24!=='undefined') saveShifts(); else saveShiftsLocal();
  updateBadge(); openRequests();
}

function rejectReq(id){
  var r=requests.find(function(x){return x.id===id;});
  if(r) r.status='rejected';
  saveRequests(); updateBadge(); openRequests();
}

function updateBadge(){
  var n=requests.filter(function(r){return r.status==='pending';}).length;
  var b=document.getElementById('reqBadge');
  b.style.display=n?'':'none'; b.innerText=n;
}

// ===== MODAL =====
function showModal(title,text,onOk){
  document.getElementById('mTitle').innerText=title;
  document.getElementById('mText').innerText=text;
  document.getElementById('mOk').onclick=function(){closeModal();onOk();};
  document.getElementById('overlay').classList.add('show');
}
function showInfo(text){
  document.getElementById('mTitle').innerText='Внимание';
  document.getElementById('mText').innerText=text;
  document.getElementById('mOk').onclick=closeModal;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function setStatus(msg,ok,err){
  var el=document.getElementById('statusBar');
  el.innerText=msg; el.className='statusbar'+(ok?' ok':err?' err':'');
  if(ok||err) setTimeout(function(){el.innerText='';el.className='statusbar';},3000);
}
</script>
<!-- BX24 SDK загружается динамически в JS -->
